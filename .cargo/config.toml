[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "force-frame-pointers=yes",
    "-C", "link-arg=-Tcrates/kernel/kernel.ld",
]

[target.aarch64-unknown-none-softfloat]
rustflags = [
    "-C", "force-frame-pointers=yes",
    "-C", "link-arg=-Tcrates/kernel/kernel-aarch64.ld",
]
